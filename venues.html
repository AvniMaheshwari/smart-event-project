{% extends 'base.html' %}
{% block title %}Venues{% endblock %}
{% block content %}
<div class="page-header"><h1>🏛️ Venues</h1><p>All available event venues on campus.</p></div>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
  {% for v in venues %}
  <div class="card">
    <div class="card-body">
      <div style="font-size:1.8rem;margin-bottom:10px;">🏛️</div>
      <div style="font-weight:700;font-size:1rem;margin-bottom:4px;">{{ v['name'] }}</div>
      <div style="color:var(--muted);font-size:.8rem;margin-bottom:10px;">📍 {{ v['location'] }}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="background:#ede9fe;color:#5b21b6;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;">
          👥 {{ v['capacity'] }} capacity
        </span>
      </div>
      <div style="font-size:.78rem;color:var(--muted);">🔧 {{ v['facilities'] }}</div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
